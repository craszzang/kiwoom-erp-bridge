# 5분봉 백테스트 설정 (백테스트-5분봉.bat 기본값)

source: sample
# source: csv
# source: kiwoom

codes:
  - "005930"

csv_dir: data/backtest
bar_minutes: 5
kiwoom_screen_no: "0110"

# 키움 분봉 조회 시 최대 봉 수 (TR 1회 약 900봉)
max_bars: 600

daily:
  paper_only: true
  session_start: "09:05"
  session_end: "15:20"
  entry_cutoff: "14:30"
  force_flat: "15:20"
  min_sell_balance_pct: 52.0
  min_execution_strength: 105.0
  exit_strength_below: 95.0
  take_profit_pct: 2.0
  stop_loss_pct: 2.5
  trail_from_peak_pct: 0.6
  min_profit_to_trail_pct: 0.35
  max_positions: 1
  base_qty: 1
  rsi_exit_high: 72.0
  use_rsi_peak_exit: true
  log_signals: false

report_dir: logs/backtest
